<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Alex's Web Page</title>

    <!-- Internal CSS for styling -->
    <style>

        /* Page background */
        body {
            background-color: #f0f8ff; /* very light blue background */
            font-family: Arial, sans-serif;
        }

        /* Style for name */
        h1 {
            color: steelblue;
        }

        /* Favorite color text */
        .favorite-color {
            color: lightblue;
            font-weight: bold;
        }

        /* Paragraph width */
        p {
            width: 70%;
        }

    </style>
</head>

<body>

    <!-- Main heading with name -->
    <h1>Alex</h1>

    <!-- Favorite color section -->
    <p>
        My favorite color is:
        <span class="favorite-color">Light Blue</span>
    </p>

    <!-- About section -->
    <h2>About Me</h2>

    </p>

</body>
</html>
